<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>16 персонажей (сценическая палитра в проекте)</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    background-color: #f8f9fa;
    margin: 0;
    padding: 40px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 30px;
    justify-items: center;
  }
  .character-card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .character-card span {
    margin-top: 15px;
    font-size: 12px;
    color: #555;
    font-weight: 600;
  }
  svg {
    width: 120px;
    height: 280px;
    overflow: visible;
  }
  /* Base SVG Styles */
  .stroke-dark { stroke: #241018; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .skin { fill: #e8b87a; }
  .skin-dark { fill: #c9955a; }
  .clothes-navy { fill: #1a0f18; }
  .clothes-grey { fill: #4a3548; }
  .clothes-white { fill: #f3e8dc; }
  .clothes-blue { fill: #6e2a3a; }
  .prop-grey { fill: #c9a574; }
  .hair-dark { fill: #120a10; }
  .hair-brown { fill: #4a301f; }

  /* Animations */
  @keyframes breathe {
    0%, 100% { transform: scaleY(1) translateY(0); }
    50% { transform: scaleY(1.02) translateY(-1px); }
  }
  @keyframes sway {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(3deg); }
  }
  @keyframes walk-front {
    0%, 100% { transform: rotate(-15deg); }
    50% { transform: rotate(15deg); }
  }
  @keyframes walk-back {
    0%, 100% { transform: rotate(15deg); }
    50% { transform: rotate(-15deg); }
  }
  @keyframes wave {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-20deg); }
    75% { transform: rotate(20deg); }
  }
  @keyframes type {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(2px); }
  }

  .torso-group {
    transform-origin: 60px 140px;
    animation: breathe 3s infinite ease-in-out;
  }
  .arm-sway {
    transform-origin: 60px 70px;
    animation: sway 3s infinite ease-in-out;
  }
  .leg-walk-f {
    transform-origin: 60px 140px;
    animation: walk-front 1.5s infinite ease-in-out;
  }
  .leg-walk-b {
    transform-origin: 60px 140px;
    animation: walk-back 1.5s infinite ease-in-out;
  }
  .arm-wave {
    transform-origin: 60px 70px;
    animation: wave 1.5s infinite ease-in-out;
  }
  .arm-type {
    transform-origin: 60px 70px;
    animation: type 0.5s infinite ease-in-out;
  }
</style>
</head>
<body>

<!-- M1: Standing with laptop -->
<div class="character-card">
  <svg viewBox="0 0 120 280" class="character-1">
    <!-- Legs -->
    <line x1="50" y1="140" x2="50" y2="240" class="stroke-dark clothes-navy" stroke-width="12"/>

    <path d="M 44 240 h 12 v 10 h -12 z" class="stroke-dark hair-dark"/>
    <path d="M 64 240 h 12 v 10 h -12 z" class="stroke-dark hair-dark"/>
    <g class="torso-group">
      <!-- Torso -->
      <rect x="40" y="60" width="40" height="80" rx="15" class="stroke-dark clothes-grey"/>
      <!-- Head -->
      <circle cx="60" cy="35" r="18" class="stroke-dark skin"/>

      <line x1="36" y1="118" x2="62" y2="118" class="stroke-dark" stroke-width="1.2"/>
      <!-- Front Arm -->

    </g>

</div>
